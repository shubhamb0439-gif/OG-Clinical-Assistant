# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - xr-messagibg

on:
  push:
    branches:
      - production
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd backend
          npm ci
          cd ../frontend
          npm ci
          cd ..

      - name: Build project
        run: |
          npm run build --if-present
          cd backend
          npm run build --if-present
          cd ../frontend
          npm run build --if-present
          cd ..

      - name: Prepare deployment package
        run: |
          # Create wwwroot structure Azure expects
          mkdir -p wwwroot
          
          # Copy backend files
          cp -r backend/* wwwroot/
          cp -r frontend wwwroot/
          
          # Add configuration files
          cp web.config wwwroot/  # For Windows
          # Or for Linux: cp .htaccess wwwroot/
          
          # Create deployment zip
          cd wwwroot
          zip -r ../release.zip .
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'xr-messagibg'
          slot-name: 'Production'
          package: release.zip
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_F686C13FE2954C6FAEF2D327F4D8339B }}
