# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js apps to Azure Web App - xr-messaging

on:
  push:
    branches:
      - production
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install root dependencies (for npm-run-all)
      - name: Install root dependencies
        run: npm install --force

      # Install and build desktop-web backend
      - name: Install desktop-web backend
        run: |
          cd desktop-web/backend
          npm install --force

      # Install and build device-pwa backend
      - name: Install device-pwa backend
        run: |
          cd device-pwa/backend
          npm install --force

      # Optional: run your combined build or start scripts
      - name: Run build (if needed)
        run: npm run bootstrap

      # Zip & deploy both apps
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: xr-messaging
          slot-name: production
          package: ./desktop-web/backend
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_D6D0F44F5A774D408C405532F9EA0817 }}



