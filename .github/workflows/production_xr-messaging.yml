# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js apps to Azure Web App - xr-messaging

on:
  push:
    branches:
      - production
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'

      # Step 3: Install root dependencies (if any)
      - name: Install root dependencies
        run: npm install || true

      # Step 4: Install backend dependencies
      - name: Install backend dependencies
        working-directory: backend
        run: npm install --force

      # Step 5: Install frontend dependencies
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --force

      # Step 6: Deploy to Azure Web App
      - name: Deploy both apps to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'xr-messaging'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_D6D0F44F5A774D408C405532F9EA0817 }}






