# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - xr-messaging

on:
  push:
    branches:
      - production
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'

      # Install root dependencies (if you have any root-level scripts)
      - name: Install root dependencies
        run: npm install

      # Install frontend dependencies
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --force

      # Copy all frontend files (HTML, CSS, JS, PNG, fonts, etc.)
      - name: Prepare frontend files
        working-directory: frontend
        run: |
          mkdir -p build
          cp *.html *.js *.css *.png build/

      # Copy frontend build into backend/public
      - name: Copy frontend to backend
        run: |
          mkdir -p backend/public
          cp -r frontend/build/* backend/public/

      # Install backend dependencies
      - name: Install backend dependencies
        working-directory: backend
        run: npm install --force

      # Zip backend for deployment
      - name: Zip backend for deployment
        run: |
          cd backend
          zip -r ../release.zip .

      # Deploy directly to Azure (no artifact upload!)
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'xr-messaging'
          slot-name: 'Production'
          package: release.zip
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_B711FBC961CA4D669DFD7810D502A2DE }}




