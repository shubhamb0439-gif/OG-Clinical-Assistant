# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy both Node.js apps to Azure Web App - xr-messaging

on:
  push:
    branches:
      - production
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'

      # ===== Desktop Webapp =====
      - name: Install frontend dependencies (desktop)
        working-directory: descotop-webapp/frontend
        run: npm install --force

      - name: Build frontend (desktop)
        working-directory: descotop-webapp/frontend
        run: npm run build || npm run build:prod || echo "No build script found"

      - name: Copy desktop build to backend
        run: |
          mkdir -p descotop-webapp/backend/public
          cp -r descotop-webapp/frontend/build/* descotop-webapp/backend/public/ || true

      - name: Install backend dependencies (desktop)
        working-directory: descotop-webapp/backend
        run: npm install --force

      # ===== Device PWA =====
      - name: Install frontend dependencies (device)
        working-directory: device-pwa/frontend
        run: npm install --force

      - name: Build frontend (device)
        working-directory: device-pwa/frontend
        run: npm run build || npm run build:prod || echo "No build script found"

      - name: Copy device build to backend
        run: |
          mkdir -p device-pwa/backend/public
          cp -r device-pwa/frontend/build/* device-pwa/backend/public/ || true

      - name: Install backend dependencies (device)
        working-directory: device-pwa/backend
        run: npm install --force

      # ===== Deploy combined app =====
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'xr-messaging'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_D6D0F44F5A774D408C405532F9EA0817 }}
