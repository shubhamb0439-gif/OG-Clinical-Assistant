<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>XR Vision (Web Device)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />

  <!-- Scope all relative URLs to /device/ -->
  <base href="/device/">

  <!-- Device-only PWA -->
  <link rel="manifest" href="/device.webmanifest" crossorigin="use-credentials" />
  <!-- Icons now come from the PWA assets folder -->
  <link rel="icon" href="assets/images/xr-logo-192.png" sizes="192x192" />
  <link rel="apple-touch-icon" href="assets/images/xr-logo-192.png" />

  <!-- Styles from device-pwa/frontend/public -->
  <link rel="stylesheet" href="assets/css/common.css" />
  <link rel="stylesheet" href="assets/css/device.css" />
</head>

<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1>XR Vision</h1>
      <div id="status" class="status status-disconnected">Status: Disconnected</div>
    </header>

    <!-- Last heard voice chip -->
    <div id="chipLastCmd" class="chip" hidden>Heard: …</div>

    <!-- Controls -->
    <section class="card controls">
      <div class="controls-row">
        <button id="btnConnect" class="chip-btn">Connect</button>
        <button id="btnStream" class="chip-btn">Start Stream</button>
        <button id="btnMute" class="chip-btn">Mute</button>
        <button id="btnVideo" class="chip-btn">Hide Video</button>
        <button id="btnVoice" class="chip-btn">Start Voice</button>
      </div>
      <div class="controls-row">
        <button id="btnStartRec" class="btn-outline">Start Recording</button>
        <button id="btnStopRec" class="btn-outline">Stop Recording</button>
      </div>
    </section>

    <!-- Preview -->
    <section class="card preview">
      <video id="preview" autoplay playsinline muted></video>
      <div id="noStream" class="preview-empty" hidden>Stream not ready</div>
    </section>

    <!-- Messages -->
    <section class="messages card">
      <h2>Messages</h2>
      <div id="msgList" class="msg-list"></div>
    </section>

    <!-- Composer -->
    <section class="composer">
      <input id="msgInput" class="input" placeholder="Type a message…" />
      <label class="urgent">
        <input id="chkUrgent" type="checkbox" />
        <span>Urgent</span>
      </label>
      <button id="btnSend" class="btn-send">Send</button>
    </section>
  </div>

  <!-- Socket.IO client (CDN, matches server 4.7.2) -->
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

  <!-- XR config (must load before app modules) -->
  <script src="assets/js/config.js"></script>

  <!-- App logic -->
  <script type="module" src="assets/js/ui.js"></script>

  <!-- Service worker registration (Device-only) -->
  <script>
    if ('serviceWorker' in navigator && location.pathname.startsWith('/device')) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw-device.js', { scope: '/device/' }).catch(console.error);
      });
    }

    // Optional: custom "Install" button support
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      const btn = document.querySelector('[data-install]');
      if (btn) btn.style.display = 'inline-flex';
    });
    document.querySelector('[data-install]')?.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
    });
  </script>
</body>
</html>
